<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ action }} Product</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; }
        nav {
            background: #1a1a2e; color: white; padding: 15px 40px;
            display: flex; justify-content: space-between; align-items: center;
        }
        nav a { color: #e94560; text-decoration: none; font-weight: bold; font-size: 20px; }
        nav .nav-links a { color: white; text-decoration: none; margin-left: 20px; font-size: 14px; }
        .container { max-width: 600px; margin: 50px auto; padding: 0 20px; }
        .card {
            background: white; border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1); padding: 40px;
        }
        h2 { font-size: 24px; color: #1a1a2e; margin-bottom: 30px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-size: 13px; font-weight: 600; color: #555; margin-bottom: 7px; text-transform: uppercase; letter-spacing: 0.5px; }
        input, textarea, select {
            width: 100%; padding: 12px 15px; border: 1px solid #ddd;
            border-radius: 8px; font-size: 14px; font-family: inherit;
            transition: border 0.2s;
        }
        input:focus, textarea:focus, select:focus { outline: none; border-color: #e94560; }
        textarea { resize: vertical; min-height: 100px; }
        .btn-row { display: flex; gap: 15px; margin-top: 30px; }
        .btn-submit {
            flex: 1; background: #e94560; color: white; border: none;
            padding: 14px; border-radius: 8px; font-size: 15px;
            font-weight: 600; cursor: pointer;
        }
        .btn-submit:hover { background: #c73652; }
        .btn-cancel {
            flex: 1; background: #f0f2f5; color: #333; text-decoration: none;
            padding: 14px; border-radius: 8px; font-size: 15px;
            font-weight: 600; text-align: center;
        }
        .btn-cancel:hover { background: #e0e0e0; }
    </style>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/theme.css') }}">
</head>
<body>
<nav>
    <a href="/">🛒 SecureShop</a>
    <div class="nav-links">
        <a href="/admin/products">← Back to Products</a>
    </div>
</nav>
<div class="container">
    <div class="card">
        <h2>{{ action }} Product</h2>
        <form method="POST" enctype="multipart/form-data">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="form-group">
                <label>Product Name</label>
                <input type="text" name="name" placeholder="e.g. iPhone 15 Pro"
                       value="{{ product[1] if product else '' }}" required>
            </div>
            <div class="form-group">
                <label>Description</label>
                <textarea name="description" placeholder="Product description...">{{ product[2] if product else '' }}</textarea>
            </div>
            <div class="form-group">
                <label>Price ($)</label>
                <input type="number" name="price" step="0.01" min="0" placeholder="0.00"
                       value="{{ product[3] if product else '' }}" required>
            </div>
            <div class="form-group">
                <label>Stock Quantity</label>
                <input type="number" name="stock" min="0" placeholder="0"
                       value="{{ product[4] if product else '' }}" required>
            </div>
            <div class="form-group">
                <label>Category</label>
                <input type="text" name="category" placeholder="e.g. Electronics"
                       value="{{ product[5] if product else '' }}">
            </div>

            <div class="form-group">
                <label>Product Image</label>
                {% if product and product[6] %}
                    <div style="margin-bottom:12px;">
                        <img src="{{ url_for('static', filename=product[6]) }}" alt="Current product image" style="width:140px;height:100px;object-fit:cover;border-radius:12px;border:1px solid rgba(255,255,255,.16);">
                        <p style="font-size:12px;color:#aaa;margin-top:6px;">Current image. Upload a new image only if you want to replace it.</p>
                    </div>
                {% endif %}
                <input type="file" name="image" accept="image/png,image/jpeg,image/jpg,image/webp,image/gif">
            </div> 
            <div class="btn-row">
                <button type="submit" class="btn-submit">{{ action }} Product</button>
                <a href="/admin/products" class="btn-cancel">Cancel</a>
            </div>
        </form>
    </div>
</div>
</body>
</html>

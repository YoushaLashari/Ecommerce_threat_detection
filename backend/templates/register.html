<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; }

        .card {
            background: white; border-radius: 12px; padding: 40px;
            box-shadow: 0 2px 20px rgba(0,0,0,0.1); width: 100%; max-width: 400px;
        }
        h2 { font-size: 24px; color: #1a1a2e; margin-bottom: 8px; }
        .subtitle { font-size: 13px; color: #888; margin-bottom: 25px; }

        .flash { padding: 10px 15px; border-radius: 8px; margin-bottom: 15px; font-size: 13px; }
        .flash.success { background: #d4edda; color: #155724; }
        .flash.danger  { background: #f8d7da; color: #721c24; }

        .form-group { margin-bottom: 18px; }
        .form-group label { display: block; font-size: 13px; color: #666; margin-bottom: 6px; }
        .form-group input {
            width: 100%; padding: 10px 15px; border: 1px solid #ddd;
            border-radius: 8px; font-size: 14px;
        }
        .form-group input:focus { outline: none; border-color: #1a1a2e; }

        .btn {
            width: 100%; background: #1a1a2e; color: white; border: none;
            padding: 12px; border-radius: 8px; font-size: 15px;
            cursor: pointer; margin-top: 5px;
        }
        .btn:hover { background: #e94560; }
        .link { text-align: center; margin-top: 20px; font-size: 13px; color: #888; }
        .link a { color: #e94560; text-decoration: none; font-weight: 600; }
    </style>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/theme.css') }}">

    <style>
        /* Auth page spacing fixes - loaded after global theme.css */
        body.auth-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 32px 16px;
            overflow-x: hidden;
        }
        .auth-page .auth-card {
            width: min(500px, 100%);
            padding: 54px 52px 34px;
            border-radius: 28px;
        }
        .auth-page .auth-card h2 {
            font-size: 30px;
            line-height: 1.15;
            margin: 0 0 10px;
        }
        .auth-page .auth-card .subtitle {
            font-size: 16px;
            margin: 0 0 32px;
            color: var(--muted) !important;
        }
        .auth-page .auth-form {
            background: transparent !important;
            border: 0 !important;
            box-shadow: none !important;
            backdrop-filter: none !important;
            padding: 0 !important;
            margin: 0 !important;
            border-radius: 0 !important;
        }
        .auth-page .form-group {
            margin-bottom: 22px !important;
        }
        .auth-page .form-group label {
            display: block;
            margin-bottom: 10px !important;
            font-size: 14px;
            font-weight: 600;
            color: #bdbdbd !important;
            line-height: 1.2;
        }
        .auth-page .form-group input {
            width: 100%;
            height: 56px;
            font-size: 16px;
            padding: 0 18px !important;
            border-radius: 18px !important;
        }
        .auth-page .btn {
            width: 100%;
            height: 64px;
            margin-top: 8px !important;
            font-size: 17px;
            border-radius: 999px !important;
        }
        .auth-page .link {
            text-align: center;
            margin-top: 26px;
            font-size: 16px;
            color: var(--muted) !important;
        }
        .auth-page .link a {
            color: #ff7a00 !important;
            font-weight: 800;
            text-decoration: none;
        }
        @media (max-width: 520px) {
            .auth-page .auth-card { padding: 38px 24px 28px; }
            .auth-page .auth-card h2 { font-size: 26px; }
        }
    </style>
</head>
<body class="auth-page">
<div class="card auth-card">
    <h2>Create Account 🛒</h2>
    <p class="subtitle">Join SecureShop today</p>

    {% with messages = get_flashed_messages(with_categories=true) %}
        {% for category, message in messages %}
            <div class="flash {{ category }}">{{ message }}</div>
        {% endfor %}
    {% endwith %}

    <form method="POST" class="auth-form">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="form-group">
            <label>Full Name</label>
            <input type="text" name="name" placeholder="Your Name" required>
        </div>
        <div class="form-group">
            <label>Email</label>
            <input type="email" name="email" placeholder="you@email.com" required>
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" name="password" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn">Register</button>
    </form>
    <div class="link">Already have an account? <a href="/login">Login</a></div>
</div>
</body>
</html>
